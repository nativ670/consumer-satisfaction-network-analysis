<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster: Consumer Cognitive Network</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        button {
            cursor: pointer;
            padding: 8px 16px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
        }
        #graph-container {
            width: 100%;
            height: 100%;
        }
        .node circle {
            stroke: #fff;
            stroke-width: 3px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .node text {
            font-size: 18px;
            font-weight: 800;
            fill: #1a1a1a;
            pointer-events: none;
            /* White halo for readability */
            paint-order: stroke;
            stroke: #ffffff;
            stroke-width: 4px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .link {
            stroke: #bdc3c7;
            stroke-opacity: 0.5;
        }
        .legend {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #eee;
            max-width: 300px;
        }
        .legend h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #2c3e50;
        }
        .legend p {
            margin: 5px 0;
            font-size: 14px;
            color: #7f8c8d;
        }
        .title-block {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: none;
        }
        .title-block h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }
        .title-block p {
            margin: 5px 0 0 0;
            font-size: 18px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div id="controls">
    <button onclick="toggleSimulation()">Freeze/Unfreeze Layout</button>
</div>

<div class="title-block">
    <h1>Consumer Cognitive Trade-off Network</h1>
    <p>Mapping the structural interactions of beauty product attributes</p>
</div>

<div id="graph-container"></div>

<div class="legend">
    <h2>Network Properties</h2>
    <p><b>Node Size:</b> PageRank Centrality<br>(Importance in mental model)</p>
    <p><b>Edge Thickness:</b> Partial Correlation<br>(Direct cognitive association)</p>
</div>

<script src="network_data.js"></script>
<script>
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select("#graph-container").append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", [0, 0, width, height]);

    const color = d3.scaleOrdinal(d3.schemeTableau10);

    // Scales
    const radiusScale = d3.scaleSqrt()
        .domain([d3.min(nodesData, d => d.pageRank), d3.max(nodesData, d => d.pageRank)])
        .range([30, 80]); // Larger for poster

    const linkScale = d3.scaleLinear()
        .domain([d3.min(linksData, d => d.value), d3.max(linksData, d => d.value)])
        .range([3, 20]); // Thicker for poster

    // Simulation
    let isRunning = true;
    const simulation = d3.forceSimulation(nodesData)
        .force("link", d3.forceLink(linksData).id(d => d.id).distance(250))
        .force("charge", d3.forceManyBody().strength(-2000))
        .force("center", d3.forceCenter(width / 2, height / 2 + 50))
        .force("collide", d3.forceCollide().radius(d => radiusScale(d.pageRank) + 40));

    const link = svg.append("g")
        .selectAll("line")
        .data(linksData)
        .enter().append("line")
        .attr("class", "link")
        .attr("stroke-width", d => linkScale(d.value));

    const node = svg.append("g")
        .selectAll("g")
        .data(nodesData)
        .enter().append("g")
        .attr("class", "node")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

    node.append("circle")
        .attr("r", d => radiusScale(d.pageRank))
        .attr("fill", (d, i) => color(i));

    node.append("text")
        .attr("dy", ".35em")
        .attr("text-anchor", "middle")
        .text(d => d.id);

    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function toggleSimulation() {
        if (isRunning) {
            simulation.stop();
        } else {
            simulation.alpha(0.3).restart();
        }
        isRunning = !isRunning;
    }

    function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }

    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }

    function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        // Keep fixed if user wants to compose the shot
        // d.fx = null;
        // d.fy = null;
    }

    // Auto-stop after 5 seconds to let it settle
    setTimeout(() => {
        if (isRunning) toggleSimulation();
    }, 5000);

</script>
</body>
</html>
